<head>

<title>Jax & Kled Bible</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0b0f;--bg2:#12141c;--bg3:#181b28;--bg4:#0d0e14;--bd:#1e2235;--t:#c8cad4;--td:#6b6f82;--tb:#eef0f7;--a:#c8aa6e;--ag:rgba(200,170,110,.25);--e:#2ecc71;--m:#f1c40f;--h:#e67e22;--x:#e74c3c;--s:#9b59b6}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--t);font-family:'Rajdhani',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 40% at 50% 0%,rgba(200,170,110,.05),transparent 60%);pointer-events:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#282c42;border-radius:3px}
.hdr{padding:1.2rem;text-align:center;border-bottom:1px solid var(--bd);background:linear-gradient(180deg,rgba(200,170,110,.04),transparent)}
.hdr h1{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.5rem;letter-spacing:4px;color:var(--a)}
.hdr .sub{font-size:.72rem;color:var(--td);letter-spacing:2px;text-transform:uppercase;margin-top:.15rem}
.cs{display:flex;justify-content:center;gap:.8rem;padding:.8rem;border-bottom:1px solid var(--bd);background:var(--bg4)}
.csb{display:flex;align-items:center;gap:.5rem;padding:.5rem 1.2rem;border-radius:10px;border:2px solid var(--bd);background:var(--bg2);cursor:pointer;transition:.2s}
.csb:hover{border-color:var(--a)}.csb.on{border-color:var(--a);background:rgba(200,170,110,.08);box-shadow:0 0 12px var(--ag)}
.csb img{width:38px;height:38px;border-radius:50%;border:2px solid var(--bd)}.csb.on img{border-color:var(--a)}
.csb span{font-family:'Orbitron',sans-serif;font-weight:700;font-size:.8rem;color:var(--td);letter-spacing:2px}.csb.on span{color:var(--a)}
/* TABS */
.vtabs{display:flex;justify-content:center;gap:0;border-bottom:1px solid var(--bd);background:var(--bg4)}
.vtab{padding:.5rem 1rem;font-weight:700;font-size:.75rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--td);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:.2s}
.vtab:hover{color:var(--t)}.vtab.on{color:var(--a);border-bottom-color:var(--a)}
.vpanel{display:none}.vpanel.on{display:block}
.ctrl{position:sticky;top:0;z-index:150;background:rgba(10,11,15,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--bd);padding:.5rem .8rem;display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;justify-content:center}
.sb{position:relative;flex:1 1 160px;max-width:250px}
.sb input{width:100%;padding:.4rem .7rem .4rem 1.8rem;background:var(--bg4);border:1px solid var(--bd);border-radius:8px;color:var(--tb);font-family:'Rajdhani',sans-serif;font-size:.88rem;font-weight:500;outline:none}
.sb input:focus{border-color:var(--a)}.sb::before{content:'\2315';position:absolute;left:.55rem;top:50%;transform:translateY(-50%);color:var(--td);font-size:.9rem}
.fb{padding:.25rem .6rem;border:1px solid var(--bd);border-radius:5px;background:var(--bg2);color:var(--td);font-family:'Rajdhani',sans-serif;font-weight:600;font-size:.7rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:.2s}
.fb:hover{background:var(--bg3);color:var(--t)}.fb.on{border-color:var(--a);color:var(--a)}
.tbn{padding:.25rem .5rem;border:1px solid var(--bd);border-radius:5px;background:var(--bg2);color:var(--td);font-size:.75rem;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:600;transition:.2s}
.tbn:hover{border-color:var(--a);color:var(--a)}
.stb{display:flex;justify-content:center;gap:.8rem;padding:.35rem;font-size:.72rem;font-weight:600;flex-wrap:wrap}
.sp{display:flex;align-items:center;gap:.2rem}.dot{width:7px;height:7px;border-radius:50%}
.dot.c1{background:var(--e)}.dot.c2{background:var(--m)}.dot.c3{background:var(--s)}.dot.c4{background:var(--h)}.dot.c5{background:var(--x)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.5rem;padding:.8rem;max-width:1400px;margin:0 auto}
.mc{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:.5rem .4rem;cursor:pointer;transition:.2s;text-align:center;position:relative}
.mc:hover{transform:translateY(-2px);background:var(--bg3);border-color:var(--a)}
.mc img{width:48px;height:48px;border-radius:10px;border:2px solid var(--bd);margin-bottom:.2rem}
.mc:hover img{border-color:var(--a)}
.mc .mn{font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:1px;color:var(--tb);line-height:1}
.mc .md{font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:.1rem}
.mc .dnum{font-family:'Orbitron',sans-serif;font-weight:900;font-size:.7rem}
.mc.c1{border-color:rgba(46,204,113,.2)}.mc.c1 .md{color:var(--e)}
.mc.c2{border-color:rgba(241,196,15,.2)}.mc.c2 .md{color:var(--m)}
.mc.c3{border-color:rgba(155,89,182,.2)}.mc.c3 .md{color:var(--s)}
.mc.c4{border-color:rgba(230,126,34,.2)}.mc.c4 .md{color:var(--h)}
.mc.c5{border-color:rgba(231,76,60,.2)}.mc.c5 .md{color:var(--x)}
.mc .wl{position:absolute;top:3px;right:4px;font-size:.55rem;font-weight:700;color:var(--td)}
.mc .wl .w{color:var(--e)}.mc .wl .l{color:var(--x)}
.mc .ban-star{position:absolute;top:3px;left:4px;font-size:.7rem;color:var(--x);display:none}
.mc .ban-star.show{display:block}
.empty{grid-column:1/-1;text-align:center;padding:2rem;color:var(--td)}
/* MODAL */
.mbg{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);overflow-y:auto;padding:.5rem}
.mbg.open{display:block}
.modal{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;width:100%;max-width:680px;margin:1.5rem auto;animation:mIn .2s ease}
@keyframes mIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.mh{display:flex;align-items:center;gap:.8rem;padding:1rem 1.2rem;border-bottom:1px solid var(--bd);background:linear-gradient(135deg,rgba(200,170,110,.05),transparent)}
.mh img{width:56px;height:56px;border-radius:10px;border:3px solid var(--a)}
.mh .mi h2{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--tb);letter-spacing:2px;line-height:1}
.mh .mi .ms{font-size:.72rem;color:var(--td)}
.mx{margin-left:auto;width:32px;height:32px;border-radius:50%;border:1px solid var(--bd);background:var(--bg);color:var(--td);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mx:hover{border-color:var(--x);color:var(--x)}
.mb{padding:1rem 1.2rem}
.ms2{margin-bottom:.8rem}
.mt{font-family:'Orbitron',sans-serif;font-size:.58rem;letter-spacing:2.5px;color:var(--a);text-transform:uppercase;margin-bottom:.4rem;display:flex;align-items:center;gap:.3rem}
.mt::after{content:'';flex:1;height:1px;background:var(--bd)}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem}
.sbox{background:rgba(255,255,255,.02);border:1px solid var(--bd);border-radius:6px;padding:.4rem;text-align:center}
.sbox .sk{font-family:'Orbitron',sans-serif;font-weight:900;font-size:.65rem;color:var(--a);margin-bottom:.15rem}
.sbox .sd{font-size:.62rem;color:var(--td);line-height:1.2}
.br{display:flex;gap:.35rem;flex-wrap:wrap}
.bi{display:flex;align-items:center;gap:.2rem;background:rgba(255,255,255,.025);border:1px solid var(--bd);border-radius:5px;padding:.12rem .35rem .12rem .15rem}
.bi img{width:24px;height:24px;border-radius:3px}.bi span{font-size:.72rem;font-weight:600;color:var(--t)}
.bi.cr{border-color:rgba(200,170,110,.3)}.bi.cr span{color:var(--a)}
.bi.st{border-color:rgba(46,204,113,.25)}.bi.st span{color:var(--e)}
.rr{display:flex;gap:.35rem;flex-wrap:wrap}
.rp{background:rgba(255,255,255,.03);border:1px solid var(--bd);border-radius:5px;padding:.15rem .45rem;font-size:.72rem;font-weight:600;color:var(--t)}
.rp.ks{border-color:rgba(200,170,110,.3);color:var(--a);background:rgba(200,170,110,.06)}
.tl{list-style:none}.tl li{font-size:.82rem;font-weight:500;line-height:1.35;padding-left:.7rem;position:relative;margin-bottom:.15rem}
.tl li::before{content:'\25B8';position:absolute;left:0;color:var(--a)}
.lb{background:rgba(200,170,110,.04);border:1px solid rgba(200,170,110,.1);border-radius:6px;padding:.6rem;font-size:.82rem;line-height:1.45}
.wlr{display:flex;gap:.5rem;align-items:center;margin-top:.3rem}
.wlb{padding:.35rem .8rem;border-radius:6px;font-weight:700;font-size:.8rem;cursor:pointer;border:none;font-family:'Rajdhani',sans-serif;letter-spacing:1px}
.wlb.win{background:rgba(46,204,113,.15);color:var(--e);border:1px solid rgba(46,204,113,.3)}
.wlb.win:hover{background:rgba(46,204,113,.25)}
.wlb.loss{background:rgba(231,76,60,.15);color:var(--x);border:1px solid rgba(231,76,60,.3)}
.wlb.loss:hover{background:rgba(231,76,60,.25)}
.wlb.rst2{background:transparent;color:var(--td);border:1px solid var(--bd);font-size:.7rem;padding:.25rem .5rem}
.wls{font-size:.85rem;font-weight:700;color:var(--tb)}
.nb textarea{width:100%;min-height:40px;padding:.35rem;background:var(--bg4);border:1px solid var(--bd);border-radius:5px;color:var(--t);font-family:'Rajdhani',sans-serif;font-size:.8rem;resize:vertical;outline:none;margin-top:.2rem}
.nb textarea:focus{border-color:var(--a)}
.banb{padding:.3rem .7rem;border-radius:5px;font-weight:700;font-size:.72rem;cursor:pointer;border:1px solid var(--bd);background:transparent;color:var(--td);font-family:'Rajdhani',sans-serif;letter-spacing:1px;margin-top:.3rem}
.banb:hover{border-color:var(--x);color:var(--x)}
.banb.banned{background:rgba(231,76,60,.1);border-color:var(--x);color:var(--x)}
/* COUNTER PICK */
.cp-panel{max-width:800px;margin:0 auto;padding:1rem}
.cp-grid{display:grid;grid-template-columns:1fr 60px 1fr;gap:.5rem;align-items:start}
.cp-col h3{font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:2px;color:var(--a);text-align:center;margin-bottom:.5rem}
.cp-vs{font-family:'Orbitron',sans-serif;font-size:1rem;color:var(--td);text-align:center;padding-top:1.5rem}
.cp-card{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:.6rem;text-align:center}
.cp-card img{width:48px;height:48px;border-radius:8px;border:2px solid var(--bd)}
.cp-card .cpn{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--tb);margin-top:.2rem}
.cp-card .cpd{font-size:.75rem;font-weight:700;margin-top:.1rem}
.cp-select{width:100%;padding:.4rem;background:var(--bg4);border:1px solid var(--bd);border-radius:6px;color:var(--tb);font-family:'Rajdhani',sans-serif;font-size:.85rem;outline:none;margin-bottom:.5rem}
.cp-select:focus{border-color:var(--a)}
.cp-rec{background:rgba(200,170,110,.04);border:1px solid rgba(200,170,110,.1);border-radius:8px;padding:.8rem;margin-top:.5rem;text-align:center}
.cp-rec h4{font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:2px;color:var(--a);margin-bottom:.3rem}
.cp-rec .pick{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--tb)}
.cp-rec .reason{font-size:.78rem;color:var(--td);margin-top:.2rem}
.credit{text-align:center;padding:.8rem;font-size:.65rem;color:var(--td);border-top:1px solid var(--bd)}
@media(max-width:600px){.grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:.3rem;padding:.5rem}.sg{grid-template-columns:repeat(2,1fr)}.cp-grid{grid-template-columns:1fr}.cp-vs{display:none}}
</style>
</head>
<body>
<div class="hdr"><h1>Jax & Kled Bible</h1><p class="sub">Guide Matchups Top Lane AZERTY — Vallheim GM Rank 1 Jax</p></div>

</div>

const J=[
{i:"Kayle",n:"Kayle",d:1,p:"Oui",k:"Conqueror",r:"Bone Plating, Unflinching",s:"Doran's Blade",b:"Gantelet, Sundered Sky",t:["Ne la laisse jamais farm free", "Freeze devant ta tour pour all-in/gank", "Tu gagnes le 1v1 des le lvl 1", "Crash wave 3, freeze sur bounce", "Spikes dangereux: lvl 6 (range), 11, 16"],l:"Zone-la du farm. Freeze + all-in pres de ta tour. Crash wave 3 en dive si possible. Ne jamais se faire freeze par Kayle."},
{i:"Camille",n:"Camille",d:2,p:"Oui",k:"Conqueror",r:"Bone Plating, Unflinching",s:"Doran's Blade",b:"Gantelet, Sundered Sky",t:["Push pour lvl 2 advantage", "Trade quand elle Z: jump dans son Z", "E avant son AA pour bloquer shield passive", "Loin des murs pour eviter son E", "Cancel son E grappin avec stun au mur"],l:"Jump dans son Z pour eviter l'extremite. Active E avant son auto. Eloigne-toi des murs."},
{i:"Irelia",n:"Irelia",d:2,p:"Oui",k:"Conqueror",r:"Bone Plating, Unflinching",s:"Doran's Blade",b:"Gantelet, Sundered Sky",t:["Prio lvl 2, crash wave 3 canon", "Trade pres de ta tour, sidestep E", "Post-6: all-in quand wave petite sans stacks", "Garde E longtemps pour ses dashes"],l:"Pre-6: gestion de wave = cle. Trade pres de ta tour. Post-6: all-in quand petite wave et pas de stacks passive."},
{i:"Nasus",n:"Nasus",d:2,p:"Oui",k:"Conqueror",r:"Bone Plating, Demolish",s:"Doran's Blade",b:"Gantelet, Sundered Sky",t:["Ne pas laisser farm. Freeze pres de tour", "Trade: A > AA + Z, garde E si A", "Le sortir de lane avant qu'il scale"],l:"Freeze + zone du farm. Trade A > AA + Z. Garde E au cas ou. Le sortir de lane."},
{i:"Sion",n:"Sion",d:2,p:"Oui",k:"Lethal Tempo",r:"Demolish, Overgrowth",s:"Doran's Blade",b:"Gantelet, Sundered Sky, Hullbreaker",t:["Attention bush lvl 1 apres leash", "Garde A pour repartir", "Lateralement pendant qu'il charge A"],l:"Attention bush lvl 1. Facile a all-in mais garde A pour repartir."},
{i:"Gwen",n:"Gwen",d:3,p:"Oui",k:"Conqueror",r:"Bone Plating, Unflinching",s:"Doran's Blade",b:"Gantelet, Sundered Sky",t:["Tout se joue lvl 1, attention portee E", "Trade quand elle A la wave", "Passe derriere elle pour full trade", "Garde E longtemps pour bait"],l:"Trade quand elle A la wave. Passe derriere instantanement. Garde E longtemps."},

let cur='jax',flt='all';
function M(){return cur==='jax'?J:K;}
function ld(k){try{return JSON.parse(localStorage.getItem(k))||{};}catch(e){return {};}}
function sv(k,v){localStorage.setItem(k,JSON.stringify(v));}
function gWL(){return ld('wl-'+cur);}
function sWL(d){sv('wl-'+cur,d);}
function gN(){return ld('notes-'+cur);}
function sN(d){sv('notes-'+cur,d);}
function gB(){return ld('bans-'+cur);}
function sB(d){sv('bans-'+cur,d);}

function sw(c){cur=c;document.querySelectorAll('.csb').forEach(b=>b.classList.remove('on'));event.currentTarget.classList.add('on');render();cpPop();}

document.querySelectorAll('.vtab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.vtab').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.vpanel').forEach(x=>x.classList.remove('on'));t.classList.add('on');document.getElementById('vp-'+t.dataset.v).classList.add('on');});});

function render(){
  const g=document.getElementById('grid');g.innerHTML='';const s=document.getElementById('search').value.toLowerCase();
  let list=M();if(flt!=='all')list=list.filter(m=>CL(m.d)===flt);if(s)list=list.filter(m=>m.n.toLowerCase().includes(s)||m.i.toLowerCase().includes(s));
  list.sort((a,b)=>a.d-b.d);const wl=gWL();const bans=gB();
  if(!list.length){g.innerHTML='<div class="empty">Aucun matchup</div>';uSt();return;}
  list.forEach((m,i)=>{const cat=CL(m.d);const c=document.createElement('div');c.className=`mc ${cat}`;c.style.animationDelay=`${i*.015}s`;
  c.onclick=()=>openM(m);const w=wl[m.i]||{w:0,l:0};const isBan=bans[m.i];
  let wlH='';if(w.w||w.l)wlH=`<span class="w">${w.w}W</span>/<span class="l">${w.l}L</span>`;
  c.innerHTML=`<div class="ban-star ${isBan?'show':''}">\u2716</div><div class="wl">${wlH}</div><img src="${IM(m.n)}" loading="lazy" onerror="this.src='${IM(m.i)}'"><div class="mn">${m.i.replace('DrMundo','Dr.Mundo').replace('MonkeyKing','Wukong').replace('Chogath',"Cho'Gath").replace('TahmKench','T.Kench').replace('Lillia','Lilia').replace('KSante',"K'Sante")}</div><div class="md"><span class="dnum">${m.d}/10</span> ${DL[m.d]||''}</div>`;
  g.appendChild(c);});uSt();
}

function openM(m){
  const notes=gN();const wl=gWL();const bans=gB();const cat=CL(m.d);const w=wl[m.i]||{w:0,l:0};
  document.getElementById('mImg').src=IM(m.n);document.getElementById('mImg').onerror=function(){this.src=IM(m.i);};
  const dName=m.i.replace('DrMundo','Dr. Mundo').replace('MonkeyKing','Wukong').replace('Chogath',"Cho'Gath").replace('TahmKench','Tahm Kench').replace('Lillia','Lilia').replace('KSante',"K'Sante").replace('Jax Mirror','Jax (Mirror)');
  document.getElementById('mName').textContent=dName;
  document.getElementById('mSub').textContent=`${m.d}/10 ${DL[m.d]} | ${m.p} | ${cur==='jax'?'Jax':'Kled'}`;
  const ksH=m.k?`<span class="rp ks">${m.k}</span>`:'';
  const r2H=m.r?m.r.split(',').map(r=>`<span class="rp">${r.trim()}</span>`).join(''):'';
  const stH=ib(m.s||"Doran's Blade",'st');
  const crH=(m.b||'').split(',').map(x=>ib(x.trim(),'cr')).join('');
  const tH=(m.t||[]).map(t=>`<li>${t}</li>`).join('');
  const isBan=bans[m.i];

  document.getElementById('mBody').innerHTML=`
    <div class="ms2"><div class="mt">Runes a prendre</div><div class="rr">${ksH}${r2H}</div></div>
    <div class="ms2"><div class="mt">Item de depart</div><div class="br">${stH}</div></div>
    <div class="ms2"><div class="mt">Build adapte</div><div class="br">${crH}</div></div>
    <div class="ms2"><div class="mt">Tips (AZERTY)</div><ul class="tl">${tH}</ul></div>
    <div class="ms2"><div class="mt">Comment jouer la lane</div><div class="lb">${m.l||'-'}</div></div>
    <div class="ms2"><div class="mt">Win/Loss Tracker</div>
      <div class="wlr"><button class="wlb win" onclick="addWL('${m.i}','w')">+ Win</button><button class="wlb loss" onclick="addWL('${m.i}','l')">+ Loss</button><span class="wls" id="wlDisplay">${w.w}W / ${w.l}L ${(w.w+w.l)>0?'('+Math.round(w.w/(w.w+w.l)*100)+'% WR)':''}</span><button class="wlb rst2" onclick="rstWL('${m.i}')">Reset</button></div>
    </div>
    <div class="ms2"><div class="mt">Notes perso</div><div class="nb"><textarea placeholder="Tes notes..." oninput="sNote('${m.i}',this.value)">${notes[m.i]||''}</textarea></div></div>
    <button class="banb ${isBan?'banned':''}" onclick="togBan('${m.i}')">${isBan?'\u2716 Retirer du banlist':'\u2716 Ajouter au banlist'}</button>
  `;
  document.getElementById('modal').classList.add('open');document.body.style.overflow='hidden';
}

function addWL(id,type){const d=gWL();if(!d[id])d[id]={w:0,l:0};d[id][type]++;sWL(d);const w=d[id];document.getElementById('wlDisplay').textContent=`${w.w}W / ${w.l}L ${(w.w+w.l)>0?'('+Math.round(w.w/(w.w+w.l)*100)+'% WR)':''}`;render();}
function rstWL(id){const d=gWL();d[id]={w:0,l:0};sWL(d);document.getElementById('wlDisplay').textContent='0W / 0L';render();}
function sNote(id,v){const d=gN();d[id]=v;sv('notes-'+cur,d);}
function togBan(id){const d=gB();d[id]=!d[id];sB(d);render();openM(M().find(m=>m.i===id));}

function closeM(){document.getElementById('modal').classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();});

function uSt(){const m=M();const c={c1:0,c2:0,c3:0,c4:0,c5:0};m.forEach(x=>c[CL(x.d)]++);
const labels={c1:'1-3 Facile',c2:'4-5 Moyen',c3:'6-7 Skill',c4:'8-9 Dur',c5:'10 Extreme'};
document.getElementById('stats').innerHTML=Object.entries(c).map(([k,v])=>`<div class="sp"><span class="dot ${k}"></span>${labels[k]}: ${v}</div>`).join('');}

document.querySelectorAll('.fb').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));b.classList.add('on');flt=b.dataset.f;render();});});
document.getElementById('search').addEventListener('input',()=>render());

// COUNTER-PICK
function cpPop(){const sel=document.getElementById('cpsel');sel.innerHTML='<option value="">-- Champion ennemi --</option>';
const allNames=new Set();J.forEach(m=>allNames.add(m.i));K.forEach(m=>allNames.add(m.i));
[...allNames].sort().forEach(n=>{sel.innerHTML+=`<option value="${n}">${n.replace('DrMundo','Dr.Mundo').replace('MonkeyKing','Wukong').replace('Chogath',"Cho'Gath").replace('TahmKench','T.Kench').replace('KSante',"K'Sante")}</option>`;});}

function cpCalc(){const enemy=document.getElementById('cpsel').value;const res=document.getElementById('cpResult');
if(!enemy){res.innerHTML='';return;}
const jm=J.find(m=>m.i===enemy);const km=K.find(m=>m.i===enemy);
let html2='<div class="cp-grid">';
html2+='<div class="cp-col"><h3>Jax</h3>';
if(jm){html2+=`<div class="cp-card"><img src="${IM('Jax')}"><div class="cpn">Jax vs ${enemy}</div><div class="cpd" style="color:${jm.d<=5?'var(--e)':jm.d<=7?'var(--m)':'var(--x)'}">${jm.d}/10 ${DL[jm.d]}</div><div style="font-size:.72rem;color:var(--td);margin-top:.3rem">${jm.p}</div></div>`;}
else{html2+='<div class="cp-card"><div class="cpn">Pas de data</div></div>';}
html2+='</div><div class="cp-vs">VS</div><div class="cp-col"><h3>Kled</h3>';
if(km){html2+=`<div class="cp-card"><img src="${IM('Kled')}"><div class="cpn">Kled vs ${enemy}</div><div class="cpd" style="color:${km.d<=5?'var(--e)':km.d<=7?'var(--m)':'var(--x)'}">${km.d}/10 ${DL[km.d]}</div><div style="font-size:.72rem;color:var(--td);margin-top:.3rem">${km.p}</div></div>`;}
else{html2+='<div class="cp-card"><div class="cpn">Pas de data</div></div>';}
html2+='</div></div>';

// Recommendation
let pick='',reason='';
if(jm&&km){if(jm.d<km.d){pick='JAX';reason=`Jax a un matchup plus facile (${jm.d}/10 vs ${km.d}/10)`;}else if(km.d<jm.d){pick='KLED';reason=`Kled a un matchup plus facile (${km.d}/10 vs ${jm.d}/10)`;}else{pick='EGAL';reason=`Meme difficulte (${jm.d}/10). Joue ton main.`;}}
else if(jm){pick='JAX';reason='Pas de data Kled pour ce matchup.';}
else if(km){pick='KLED';reason='Pas de data Jax pour ce matchup.';}
else{pick='?';reason='Pas de data pour les deux.';}

html2+=`<div class="cp-rec"><h4>Recommandation</h4><div class="pick">${pick}</div><div class="reason">${reason}</div></div>`;
res.innerHTML=html2;
}

// EXPORT/IMPORT
function xp(){const data={jaxNotes:ld('notes-jax'),kledNotes:ld('notes-kled'),jaxWL:ld('wl-jax'),kledWL:ld('wl-kled'),jaxBans:ld('bans-jax'),kledBans:ld('bans-kled')};
const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='jax-kled-bible-backup.json';a.click();}

function ipm(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){try{const d=JSON.parse(ev.target.result);
if(d.jaxNotes)sv('notes-jax',d.jaxNotes);if(d.kledNotes)sv('notes-kled',d.kledNotes);
if(d.jaxWL)sv('wl-jax',d.jaxWL);if(d.kledWL)sv('wl-kled',d.kledWL);
if(d.jaxBans)sv('bans-jax',d.jaxBans);if(d.kledBans)sv('bans-kled',d.kledBans);
render();alert('Import OK!');}catch(err){alert('Fichier invalide');}};r.readAsText(f);e.target.value='';}

render();cpPop();
</script>
</body>
</html>
