<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUB 40 — Plan 22 semaines</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: #2a2a3a;
  --text: #e8e8f0;
  --text2: #8888a0;
  --accent: #00e676;
  --accent2: #00c853;
  --accent-dim: rgba(0,230,118,0.1);
  --accent-glow: rgba(0,230,118,0.3);
  --orange: #ff9100;
  --orange-dim: rgba(255,145,0,0.1);
  --red: #ff5252;
  --red-dim: rgba(255,82,82,0.1);
  --blue: #448aff;
  --blue-dim: rgba(68,138,255,0.1);
  --purple: #b388ff;
  --purple-dim: rgba(179,136,255,0.1);
  --yellow: #ffd740;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  padding-bottom: 100px;
}
.hero {
  padding: 40px 20px 30px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 50% 80%, var(--accent-glow) 0%, transparent 50%);
  opacity: 0.3;
}
.hero h1 {
  font-family: 'Space Mono', monospace;
  font-size: clamp(2.5rem, 8vw, 4rem);
  font-weight: 700;
  letter-spacing: -2px;
  position: relative;
  background: linear-gradient(135deg, var(--accent) 0%, var(--yellow) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.hero .subtitle {
  font-size: 0.95rem;
  color: var(--text2);
  margin-top: 8px;
  font-weight: 300;
  position: relative;
}
.hero .target {
  font-family: 'Space Mono', monospace;
  font-size: 1.1rem;
  color: var(--accent);
  margin-top: 12px;
  position: relative;
}
.countdown {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-top: 20px;
  position: relative;
}
.countdown-unit {
  text-align: center;
}
.countdown-val {
  font-family: 'Space Mono', monospace;
  font-size: clamp(1.8rem, 6vw, 2.6rem);
  font-weight: 700;
  color: var(--text);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px;
  min-width: 60px;
  display: block;
  line-height: 1;
}
.countdown-label {
  font-size: 0.65rem;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-top: 6px;
}
.countdown-sep {
  font-family: 'Space Mono', monospace;
  font-size: 2rem;
  color: var(--text2);
  align-self: flex-start;
  padding-top: 8px;
}

/* Stats bar */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  padding: 0 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
}
.stat-card .val {
  font-family: 'Space Mono', monospace;
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--accent);
}
.stat-card .label {
  font-size: 0.75rem;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 4px;
}

/* Progress global */
.global-progress {
  margin: 0 16px 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
}
.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.progress-header span {
  font-size: 0.85rem;
  color: var(--text2);
}
.progress-header .pct {
  font-family: 'Space Mono', monospace;
  color: var(--accent);
  font-weight: 700;
}
.progress-bar-bg {
  height: 8px;
  background: var(--surface2);
  border-radius: 4px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 4px;
  transition: width 0.5s ease;
  box-shadow: 0 0 12px var(--accent-glow);
}

/* Weight tracker */
.weight-section {
  margin: 0 16px 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
}
.weight-section h3 {
  font-size: 0.85rem;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}
.weight-row {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.weight-input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 1.1rem;
  width: 100px;
  text-align: center;
  outline: none;
}
.weight-input:focus { border-color: var(--accent); }
.weight-btn {
  background: var(--accent-dim);
  border: 1px solid var(--accent);
  color: var(--accent);
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
}
.weight-btn:hover { background: var(--accent-glow); }
.weight-display {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  margin-top: 10px;
}
.weight-tag {
  background: var(--surface2);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 0.8rem;
  font-family: 'Space Mono', monospace;
  color: var(--text2);
}
.weight-tag.current {
  color: var(--accent);
  border: 1px solid var(--accent);
  background: var(--accent-dim);
}
.weight-targets {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
}
.weight-target {
  font-size: 0.75rem;
  color: var(--text2);
  background: var(--surface2);
  padding: 4px 8px;
  border-radius: 4px;
}
.weight-chart-wrap {
  margin-top: 16px;
  position: relative;
  width: 100%;
  border-radius: 8px;
  overflow: hidden;
  background: var(--surface2);
}
.weight-chart-wrap canvas {
  width: 100%;
  height: 200px;
  display: block;
}
.chart-legend {
  display: flex;
  gap: 16px;
  margin-top: 8px;
  justify-content: center;
}
.chart-legend span {
  font-size: 0.75rem;
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text2);
}
.chart-legend .dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
}
.dot-actual { background: #00e676; }
.dot-target { background: #ff9100; }
.weight-delete {
  font-size: 0.7rem;
  color: var(--red);
  cursor: pointer;
  margin-left: 4px;
  opacity: 0.6;
}
.weight-delete:hover { opacity: 1; }

/* Nav blocs */
.bloc-nav {
  display: flex;
  gap: 8px;
  padding: 0 16px;
  margin-bottom: 20px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.bloc-nav::-webkit-scrollbar { display: none; }
.bloc-tab {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  transition: all 0.2s;
  white-space: nowrap;
}
.bloc-tab.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}
.bloc-tab:hover { border-color: var(--accent); }

/* Bloc container */
.bloc-container { padding: 0 16px; }
.bloc-section { display: none; }
.bloc-section.active { display: block; }
.bloc-header {
  margin-bottom: 16px;
}
.bloc-header h2 {
  font-size: 1.3rem;
  font-weight: 800;
}
.bloc-header .bloc-obj {
  font-size: 0.85rem;
  color: var(--text2);
  margin-top: 4px;
}
.bloc-progress {
  margin-bottom: 20px;
}

/* Semaine */
.semaine {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 16px;
  overflow: hidden;
  transition: border-color 0.3s;
}
.semaine.completed {
  border-color: var(--accent);
  box-shadow: 0 0 20px rgba(0,230,118,0.05);
}
.semaine-header {
  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  user-select: none;
}
.semaine-header:hover { background: var(--surface2); }
.sem-title {
  font-weight: 700;
  font-size: 1rem;
}
.sem-dates {
  font-size: 0.8rem;
  color: var(--text2);
  margin-top: 2px;
}
.sem-badge {
  font-family: 'Space Mono', monospace;
  font-size: 0.8rem;
  padding: 4px 10px;
  border-radius: 6px;
  font-weight: 700;
}
.sem-badge.pending { background: var(--surface2); color: var(--text2); }
.sem-badge.partial { background: var(--orange-dim); color: var(--orange); }
.sem-badge.done { background: var(--accent-dim); color: var(--accent); }

.semaine-body {
  display: none;
  padding: 0 16px 16px;
}
.semaine.open .semaine-body { display: block; }

/* Session */
.session {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.session:last-child { border-bottom: none; }
.session-check {
  flex-shrink: 0;
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
  transition: all 0.2s;
}
.session-check:hover { border-color: var(--accent); }
.session-check.checked {
  background: var(--accent);
  border-color: var(--accent);
}
.session-check.checked::after {
  content: '✓';
  color: var(--bg);
  font-weight: 800;
  font-size: 14px;
}
.session-info { flex: 1; }
.session-day {
  font-weight: 700;
  font-size: 0.9rem;
  display: flex;
  align-items: center;
  gap: 8px;
}
.session-type {
  font-size: 0.65rem;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.type-frac { background: var(--red-dim); color: var(--red); }
.type-footing { background: var(--blue-dim); color: var(--blue); }
.type-tempo { background: var(--orange-dim); color: var(--orange); }
.type-test { background: var(--purple-dim); color: var(--purple); }
.type-course { background: var(--accent-dim); color: var(--accent); }
.type-muscu { background: rgba(255,215,64,0.1); color: var(--yellow); }
.session-detail {
  font-size: 0.85rem;
  color: var(--text2);
  margin-top: 4px;
  line-height: 1.5;
}
.session-detail strong {
  color: var(--text);
  font-weight: 600;
}
.session-note {
  font-size: 0.78rem;
  color: var(--orange);
  margin-top: 4px;
  font-style: italic;
}

/* Muscu section */
.muscu-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
}
.muscu-card h3 {
  font-size: 1rem;
  margin-bottom: 10px;
  color: var(--yellow);
}
.muscu-card .session-detail {
  margin-top: 0;
}

/* Reset btn */
.reset-zone {
  text-align: center;
  padding: 40px 16px;
}
.reset-btn {
  background: var(--red-dim);
  border: 1px solid var(--red);
  color: var(--red);
  padding: 10px 24px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  font-size: 0.85rem;
}
.reset-btn:hover { background: rgba(255,82,82,0.2); }

/* Animations */
@keyframes fadeIn {
  from { opacity:0; transform: translateY(10px); }
  to { opacity:1; transform: translateY(0); }
}
.semaine { animation: fadeIn 0.3s ease; }
</style>
</head>

      { num:20, label:"Semaine 20", dates:"14 – 20 sept.", note:"Grosse semaine spécifique", sessions: [
        {day:"Mardi", type:"frac", desc:"4 × 1500m à 3:55–4:00/km", detail:"Récup 2'30"},
        {day:"Jeudi", type:"footing", desc:"45 min footing"},
        {day:"Samedi", type:"test", desc:"Test 5 km", detail:"Objectif : 19:15–20:00"},
        {day:"Dimanche", type:"footing", desc:"1h footing lent"}
      ]}
    ]
  },
  {
    bloc: 5, title: "BLOC 5", obj: "Affûtage + course", weeks: [
      { num:21, label:"Semaine 21", dates:"21 – 27 sept.", sessions: [
        {day:"Mardi", type:"frac", desc:"5 × 1000m à 3:55/km", detail:"Récup 2'"},
        {day:"Jeudi", type:"footing", desc:"45 min footing lent"},
        {day:"Samedi", type:"tempo", desc:"20 min à 4:00/km", detail:"Pas plus."},
        {day:"Dimanche", type:"footing", desc:"50 min facile"}
      ]},
      { num:22, label:"Semaine 22", dates:"28 sept. – 4 oct.", note:"Semaine course !", sessions: [
        {day:"Mardi", type:"frac", desc:"6 × 400m à 3:50–3:55/km", detail:"Récup 1'30 · Séance facile, pas à bloc"},
        {day:"Jeudi", type:"footing", desc:"35 min footing + 4 lignes droites"},
        {day:"Vendredi", type:"footing", desc:"Repos"},
        {day:"Samedi", type:"footing", desc:"20 min footing très lent"},
        {day:"Dimanche", type:"course", desc:"COURSE 10 KM", detail:"km1: 4:02 · km2-5: 3:58-4:00 · km6-8: 3:55-3:58 · km9: tu serres · km10: tu vides", note:"Obj C: sub 42 · Obj B: sub 40 · Obj A: 38:xx"}
      ]}
    ]
  }
];

const WEIGHT_TARGETS = [
  {label:"Mai", target:"96–97"},
  {label:"Juin", target:"94–95"},
  {label:"Juil", target:"92–93"},
  {label:"Août", target:"91–92"},
  {label:"Sept", target:"89–91"}
];

let state = JSON.parse(localStorage.getItem('sub40_state') || '{}');
if (!state.checked) state.checked = {};
if (!state.weights) state.weights = [];
if (!state.activeBloc) state.activeBloc = 0;

function save() {
  localStorage.setItem('sub40_state', JSON.stringify(state));
}

function getSessionId(weekNum, idx) {
  return `w${weekNum}_s${idx}`;
}

function countAll() {
  let total = 0, done = 0;
  PLAN.forEach(b => b.weeks.forEach(w => w.sessions.forEach((s, i) => {
    total++;
    if (state.checked[getSessionId(w.num, i)]) done++;
  })));
  return {total, done};
}

function countBloc(blocIdx) {
  let total = 0, done = 0;
  PLAN[blocIdx].weeks.forEach(w => w.sessions.forEach((s, i) => {
    total++;
    if (state.checked[getSessionId(w.num, i)]) done++;
  }));
  return {total, done};
}

function countWeek(weekNum, sessions) {
  let total = sessions.length, done = 0;
  sessions.forEach((s, i) => {
    if (state.checked[getSessionId(weekNum, i)]) done++;
  });
  return {total, done};
}

function getCurrentWeek() {
  const now = new Date();
  const start = new Date(2026, 4, 4); // 4 mai 2026
  const diff = Math.floor((now - start) / (7 * 24 * 60 * 60 * 1000));
  return Math.max(1, Math.min(22, diff + 1));
}

function getStreakDays() {
  const checks = Object.keys(state.checked).filter(k => state.checked[k]);
  return checks.length;
}

function renderStats() {
  const {total, done} = countAll();
  const currentWeek = getCurrentWeek();
  const latestWeight = state.weights.length > 0 ? state.weights[state.weights.length - 1].val : 98;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="val">${done}/${total}</div><div class="label">Séances</div></div>
    <div class="stat-card"><div class="val">S${currentWeek}</div><div class="label">Semaine</div></div>
    <div class="stat-card"><div class="val">${latestWeight}</div><div class="label">kg</div></div>
    <div class="stat-card"><div class="val">${Math.round((done/total)*100)}%</div><div class="label">Complétion</div></div>
  `;
}

function renderGlobalProgress() {
  const {total, done} = countAll();
  const pct = Math.round((done/total)*100);
  document.getElementById('globalProgress').innerHTML = `
    <div class="progress-header">
      <span>Progression globale</span>
      <span class="pct">${pct}%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" style="width:${pct}%"></div>
    </div>
  `;
}

function renderWeight() {
  const latest = state.weights.length > 0 ? state.weights[state.weights.length - 1].val : null;
  let tagsHtml = state.weights.slice(-8).map((w, i) => {
    const realIdx = state.weights.length > 8 ? state.weights.length - 8 + i : i;
    return `<span class="weight-tag">${w.date}: ${w.val} kg<span class="weight-delete" onclick="deleteWeight(${realIdx})">✕</span></span>`;
  }).join('');

  let targetsHtml = WEIGHT_TARGETS.map(t =>
    `<span class="weight-target">Fin ${t.label}: ${t.target} kg</span>`
  ).join('');

  document.getElementById('weightSection').innerHTML = `
    <h3>Suivi poids · Objectif 98 → 89–91 kg</h3>
    <div class="weight-row">
      <input type="number" class="weight-input" id="weightInput" placeholder="kg" step="0.1" min="60" max="150">
      <button class="weight-btn" onclick="addWeight()">Enregistrer</button>
      ${latest ? `<span class="weight-tag current">${latest} kg</span>` : ''}
    </div>
    ${tagsHtml ? `<div class="weight-display">${tagsHtml}</div>` : ''}
    <div class="weight-targets">${targetsHtml}</div>
    <div class="weight-chart-wrap">
      <canvas id="weightChart"></canvas>
    </div>
    <div class="chart-legend">
      <span><span class="dot dot-actual"></span>Poids réel</span>
      <span><span class="dot dot-target"></span>Objectif</span>
    </div>
  `;
  renderWeightChart();
}

function renderWeightChart() {
  const canvas = document.getElementById('weightChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 200 * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = '200px';
  ctx.scale(dpr, dpr);
  const W = rect.width;
  const H = 200;
  const pad = {top:20, right:16, bottom:32, left:44};
  const cW = W - pad.left - pad.right;
  const cH = H - pad.top - pad.bottom;

  // Target points (month-end dates as day offsets from May 4)
  const targetPts = [
    {day:0, kg:98},
    {day:27, kg:96.5},   // fin mai
    {day:58, kg:94.5},   // fin juin
    {day:88, kg:92.5},   // fin juil
    {day:119, kg:91.5},  // fin août
    {day:153, kg:90}     // fin sept
  ];

  // Actual weight points
  const startDate = new Date(2026, 4, 4).getTime(); // May 4
  const endDay = 153;
  const actualPts = state.weights.map(w => {
    const ts = w.ts || startDate;
    const day = Math.max(0, Math.round((ts - startDate) / (24*60*60*1000)));
    return {day, kg: w.val};
  });

  // Y range
  const allKg = [...targetPts.map(p=>p.kg), ...actualPts.map(p=>p.kg)];
  const minKg = Math.floor(Math.min(...allKg) - 1);
  const maxKg = Math.ceil(Math.max(...allKg) + 1);

  function x(day) { return pad.left + (day / endDay) * cW; }
  function y(kg) { return pad.top + ((maxKg - kg) / (maxKg - minKg)) * cH; }

  // Background
  ctx.fillStyle = '#1a1a26';
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = '#2a2a3a';
  ctx.lineWidth = 0.5;
  const kgStep = maxKg - minKg > 10 ? 2 : 1;
  for (let kg = minKg; kg <= maxKg; kg += kgStep) {
    ctx.beginPath();
    ctx.moveTo(pad.left, y(kg));
    ctx.lineTo(W - pad.right, y(kg));
    ctx.stroke();
    ctx.fillStyle = '#8888a0';
    ctx.font = '11px "Space Mono", monospace';
    ctx.textAlign = 'right';
    ctx.fillText(kg + '', pad.left - 6, y(kg) + 4);
  }

  // Month labels
  const months = [{day:0,l:'Mai'},{day:31,l:'Juin'},{day:61,l:'Juil'},{day:92,l:'Août'},{day:123,l:'Sept'},{day:153,l:'Oct'}];
  ctx.fillStyle = '#8888a0';
  ctx.font = '11px "Outfit", sans-serif';
  ctx.textAlign = 'center';
  months.forEach(m => {
    if (m.day <= endDay) {
      ctx.fillText(m.l, x(m.day), H - 8);
      ctx.strokeStyle = '#2a2a3a';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(x(m.day), pad.top);
      ctx.lineTo(x(m.day), H - pad.bottom);
      ctx.stroke();
    }
  });

  // Target line (dashed orange)
  ctx.strokeStyle = '#ff9100';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  targetPts.forEach((p, i) => {
    i === 0 ? ctx.moveTo(x(p.day), y(p.kg)) : ctx.lineTo(x(p.day), y(p.kg));
  });
  ctx.stroke();
  ctx.setLineDash([]);

  // Target dots
  targetPts.forEach(p => {
    ctx.beginPath();
    ctx.arc(x(p.day), y(p.kg), 3, 0, Math.PI * 2);
    ctx.fillStyle = '#ff9100';
    ctx.fill();
  });

  // Actual weight line
  if (actualPts.length > 0) {
    // Area fill
    ctx.beginPath();
    ctx.moveTo(x(actualPts[0].day), y(actualPts[0].kg));
    actualPts.forEach(p => ctx.lineTo(x(p.day), y(p.kg)));
    ctx.lineTo(x(actualPts[actualPts.length-1].day), H - pad.bottom);
    ctx.lineTo(x(actualPts[0].day), H - pad.bottom);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, pad.top, 0, H - pad.bottom);
    grad.addColorStop(0, 'rgba(0,230,118,0.25)');
    grad.addColorStop(1, 'rgba(0,230,118,0)');
    ctx.fillStyle = grad;
    ctx.fill();

    // Line
    ctx.strokeStyle = '#00e676';
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    actualPts.forEach((p, i) => {
      i === 0 ? ctx.moveTo(x(p.day), y(p.kg)) : ctx.lineTo(x(p.day), y(p.kg));
    });
    ctx.stroke();

    // Dots
    actualPts.forEach(p => {
      ctx.beginPath();
      ctx.arc(x(p.day), y(p.kg), 4, 0, Math.PI * 2);
      ctx.fillStyle = '#00e676';
      ctx.fill();
      ctx.strokeStyle = '#0a0a0f';
      ctx.lineWidth = 2;
      ctx.stroke();
    });

    // Last value label
    const last = actualPts[actualPts.length - 1];
    ctx.fillStyle = '#00e676';
    ctx.font = 'bold 12px "Space Mono", monospace';
    ctx.textAlign = 'left';
    ctx.fillText(last.kg + ' kg', x(last.day) + 8, y(last.kg) + 4);
  }
}

function addWeight() {
  const input = document.getElementById('weightInput');
  const val = parseFloat(input.value);
  if (!val || val < 60 || val > 150) return;
  const date = new Date().toLocaleDateString('fr-FR', {day:'2-digit', month:'short'});
  state.weights.push({val, date, ts: Date.now()});
  save();
  renderWeight();
  renderStats();
  input.value = '';
}

function deleteWeight(idx) {
  if (idx >= 0 && idx < state.weights.length) {
    state.weights.splice(idx, 1);
    save();
    renderWeight();
    renderStats();
  }
}

function renderBlocNav() {
  document.getElementById('blocNav').innerHTML = PLAN.map((b, i) => {
    const {total, done} = countBloc(i);
    const status = done === 0 ? '' : done === total ? ' ✓' : ` ${done}/${total}`;
    return `<div class="bloc-tab ${i === state.activeBloc ? 'active' : ''}" onclick="switchBloc(${i})">${b.title}${status}</div>`;
  }).join('') + `<div class="bloc-tab ${state.activeBloc === 5 ? 'active' : ''}" onclick="switchBloc(5)">Muscu</div>`;
}

function switchBloc(idx) {
  state.activeBloc = idx;
  save();
  renderBlocNav();
  renderBlocs();
}

function typeLabel(type) {
  const map = {frac:'Fractionné',footing:'Footing',tempo:'Tempo/Seuil',test:'Test',course:'Course',muscu:'Muscu'};
  return map[type] || type;
}

function toggleSession(weekNum, idx) {
  const id = getSessionId(weekNum, idx);
  state.checked[id] = !state.checked[id];
  save();
  renderAll();
}

function toggleWeek(weekNum) {
  const el = document.getElementById(`week-${weekNum}`);
  el.classList.toggle('open');
}

function renderBlocs() {
  const container = document.getElementById('blocContainer');

  if (state.activeBloc === 5) {
    container.innerHTML = `
      <div class="bloc-header">
        <h2>Musculation</h2>
        <div class="bloc-obj">Lundi + Mercredi · Pas à l'échec</div>
      </div>
      <div class="muscu-card">
        <h3>Lundi — Haut du corps</h3>
        <div class="session-detail">
          <strong>Pompes</strong> : 4 séries<br>
          <strong>Tractions</strong> : 4 séries<br>
          <strong>Dips</strong> : 3 séries<br>
          <strong>Gainage</strong> : 3 × 45 sec
        </div>
      </div>
      <div class="muscu-card">
        <h3>Mercredi — Haut du corps léger</h3>
        <div class="session-detail">
          <strong>Pompes</strong> : 3 séries<br>
          <strong>Tractions</strong> : 3 séries<br>
          <strong>Dips</strong> : 2 séries<br>
          <strong>Abdos/gainage</strong> : 10 min
        </div>
        <div class="session-note">Pas à l'échec. Tu dois garder de l'énergie pour courir.</div>
      </div>
    `;
    return;
  }

  const bloc = PLAN[state.activeBloc];
  const {total, done} = countBloc(state.activeBloc);
  const pct = Math.round((done/total)*100);

  let weeksHtml = bloc.weeks.map(w => {
    const wk = countWeek(w.num, w.sessions);
    const badgeClass = wk.done === 0 ? 'pending' : wk.done === wk.total ? 'done' : 'partial';
    const badgeText = wk.done === 0 ? `0/${wk.total}` : wk.done === wk.total ? '✓' : `${wk.done}/${wk.total}`;
    const isCompleted = wk.done === wk.total;
    const isCurrent = w.num === getCurrentWeek();

    let sessionsHtml = w.sessions.map((s, i) => {
      const sid = getSessionId(w.num, i);
      const checked = state.checked[sid];
      return `
        <div class="session">
          <div class="session-check ${checked ? 'checked' : ''}" onclick="toggleSession(${w.num}, ${i})"></div>
          <div class="session-info">
            <div class="session-day">${s.day} <span class="session-type type-${s.type}">${typeLabel(s.type)}</span></div>
            <div class="session-detail"><strong>${s.desc}</strong>${s.detail ? '<br>' + s.detail : ''}</div>
            ${s.note ? `<div class="session-note">${s.note}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');

    return `
      <div class="semaine ${isCompleted ? 'completed' : ''} ${isCurrent ? 'open' : ''}" id="week-${w.num}">
        <div class="semaine-header" onclick="toggleWeek(${w.num})">
          <div>
            <div class="sem-title">${w.label}${w.note ? ' · ' + w.note : ''}</div>
            <div class="sem-dates">${w.dates}</div>
          </div>
          <span class="sem-badge ${badgeClass}">${badgeText}</span>
        </div>
        <div class="semaine-body">${sessionsHtml}</div>
      </div>
    `;
  }).join('');

  container.innerHTML = `
    <div class="bloc-header">
      <h2>${bloc.title}</h2>
      <div class="bloc-obj">${bloc.obj}</div>
    </div>
    <div class="bloc-progress">
      <div class="progress-header">
        <span>${done}/${total} séances</span>
        <span class="pct">${pct}%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width:${pct}%"></div>
      </div>
    </div>
    ${weeksHtml}
  `;
}

function renderAll() {
  renderStats();
  renderGlobalProgress();
  renderWeight();
  renderBlocNav();
  renderBlocs();
}

function resetAll() {
  if (confirm('Tout réinitialiser ? Tu perdras ta progression.')) {
    state = {checked:{}, weights:[], activeBloc:0};
    save();
    renderAll();
  }
}

renderAll();
window.addEventListener('resize', () => renderWeightChart());

function renderCountdown() {
  const raceDay = new Date(2026, 9, 4, 9, 0, 0);
  const now = new Date();
  const diff = raceDay - now;
  const el = document.getElementById('countdown');
  if (diff <= 0) {
    el.innerHTML = `<div class="countdown-unit"><span class="countdown-val" style="color:var(--accent)">JOUR J</span></div>`;
    return;
  }
  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
  const mins = Math.floor((diff % (1000*60*60)) / (1000*60));
  const secs = Math.floor((diff % (1000*60)) / 1000);
  el.innerHTML = `
    <div class="countdown-unit"><span class="countdown-val">${days}</span><div class="countdown-label">Jours</div></div>
    <span class="countdown-sep">:</span>
    <div class="countdown-unit"><span class="countdown-val">${String(hours).padStart(2,'0')}</span><div class="countdown-label">Heures</div></div>
    <span class="countdown-sep">:</span>
    <div class="countdown-unit"><span class="countdown-val">${String(mins).padStart(2,'0')}</span><div class="countdown-label">Min</div></div>
    <span class="countdown-sep">:</span>
    <div class="countdown-unit"><span class="countdown-val">${String(secs).padStart(2,'0')}</span><div class="countdown-label">Sec</div></div>
  `;
}
renderCountdown();
setInterval(renderCountdown, 1000);
</script>
