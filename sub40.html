<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>SUB 40 — Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06060a;--sf:#0e0e14;--sf2:#15151e;--sf3:#1c1c28;
  --bd:#252535;--bd2:#35354a;
  --tx:#f0f0f5;--tx2:#7a7a95;--tx3:#4a4a60;
  --ac:#ff4d00;--ac2:#ff6a2a;--acg:#ff4d0044;
  --gr:#00e676;--grd:#00e67615;--grg:#00e67633;
  --yl:#ffea00;--yld:#ffea0015;
  --rd:#ff1744;--rdd:#ff174415;
  --bl:#40c4ff;--bld:#40c4ff15;
  --pr:#e040fb;--prd:#e040fb15;
  --cy:#18ffff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.app{max-width:520px;margin:0 auto;padding:16px 16px 110px}

/* Hero */
.hero{position:relative;padding:28px 0 18px;text-align:center;margin-bottom:16px;overflow:hidden}
.hero::before{content:'';position:absolute;top:-60%;left:-20%;width:140%;height:200%;background:radial-gradient(ellipse at 50% 0%,var(--acg) 0%,transparent 60%);pointer-events:none;animation:pulse 4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:4rem;letter-spacing:8px;color:var(--ac);line-height:.85;position:relative;text-shadow:0 0 40px var(--acg),0 0 80px var(--acg)}
.hero .tl{font-size:.65rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--tx2);margin-top:5px;position:relative}
.hero .td{font-size:.95rem;font-weight:600;margin-top:8px;position:relative;text-transform:capitalize}
.cd-row{display:flex;justify-content:center;gap:16px;margin-top:12px;position:relative}
.cd-item{text-align:center}
.cd-v{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;color:var(--ac);line-height:1}
.cd-l{font-size:.5rem;color:var(--tx2);text-transform:uppercase;letter-spacing:1px}

/* Quote */
.qt{background:linear-gradient(135deg,var(--sf2),var(--sf3));border:1px solid var(--bd);border-radius:14px;padding:14px 16px;margin-bottom:14px;text-align:center;font-style:italic;font-size:.78rem;color:var(--tx2);line-height:1.5;position:relative}
.qt::before{content:'«';position:absolute;top:6px;left:10px;font-size:1.6rem;color:var(--ac);opacity:.25;font-style:normal}
.qt .qa{font-size:.6rem;color:var(--tx3);margin-top:4px;font-style:normal;font-weight:600}

/* Stats */
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:14px}
.st{background:linear-gradient(135deg,var(--sf),var(--sf2));border:1px solid var(--bd);border-radius:12px;padding:12px;position:relative;overflow:hidden}
.st::after{content:'';position:absolute;top:0;right:0;width:50px;height:50px;background:radial-gradient(circle,var(--acg) 0%,transparent 70%);opacity:.3;pointer-events:none}
.st .sl{font-size:.55rem;color:var(--tx2);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.st .sv{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--tx);line-height:1.1;margin-top:1px}
.st .sv span{color:var(--ac);font-size:1.1rem}
.st .ss{font-size:.6rem;color:var(--tx3);margin-top:1px}

/* XP */
.xp{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;margin-bottom:14px}
.xp-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.xp-lv{font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:2px;display:flex;align-items:center;gap:5px}
.xp-badge{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;font-size:.6rem;padding:2px 7px;border-radius:8px;font-family:'Outfit';font-weight:800}
.xp-amt{font-size:.65rem;color:var(--tx2);font-weight:600}
.xp-bar{height:5px;background:var(--sf3);border-radius:3px;overflow:hidden}
.xp-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--ac),var(--ac2),var(--yl));background-size:200% 100%;animation:shim 2s ease infinite;transition:width .6s cubic-bezier(.25,.8,.25,1)}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Day bar */
.dp{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;margin-bottom:14px}
.dp-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.dp-l{font-size:.65rem;color:var(--tx2);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.dp-c{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--ac)}
.dp-b{height:4px;background:var(--sf3);border-radius:2px;overflow:hidden}
.dp-f{height:100%;border-radius:2px;background:var(--gr);transition:width .4s ease}

/* Week strip */
.ws{display:flex;gap:4px;margin-bottom:14px;justify-content:center}
.wd{width:42px;height:52px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border:1.5px solid var(--bd);color:var(--tx3);background:var(--sf);cursor:pointer;transition:all .2s;font-size:.58rem;font-weight:700;text-transform:uppercase}
.wd .wn{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;color:var(--tx2);line-height:1}
.wd.today{border-color:var(--ac);color:var(--ac)}.wd.today .wn{color:var(--ac)}
.wd.active{background:var(--ac);border-color:var(--ac);color:#fff}.wd.active .wn{color:#fff}

/* Card */
.c{background:linear-gradient(160deg,var(--sf),var(--sf2));border:1px solid var(--bd);border-radius:14px;padding:14px;margin-bottom:10px;position:relative;overflow:hidden}
.ct{font-family:'Bebas Neue',sans-serif;font-size:.92rem;letter-spacing:2px;color:var(--ac);margin-bottom:8px;display:flex;align-items:center;gap:7px}
.ct-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}

/* Task */
.t{background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:10px;margin-bottom:5px;display:flex;align-items:center;gap:9px;transition:all .3s;position:relative;overflow:hidden}
.t::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--bd);border-radius:0 3px 3px 0;transition:all .3s}
.t.done{border-color:var(--gr);background:var(--grd)}.t.done::before{background:var(--gr)}.t.done .tt{opacity:.4}.t.done .tn{text-decoration:line-through}
.ck{width:26px;height:26px;border-radius:50%;border:2px solid var(--bd2);background:transparent;color:transparent;font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;flex-shrink:0}
.ck.on{background:var(--gr);border-color:var(--gr);color:#fff;box-shadow:0 0 10px var(--grg)}.ck.on::after{content:'✓'}
.tt{flex:1;min-width:0}.tn{font-weight:600;font-size:.78rem;line-height:1.3}.td2{font-size:.65rem;color:var(--tx2);margin-top:1px;line-height:1.3}
.pill{font-size:.48rem;padding:2px 6px;border-radius:7px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0;white-space:nowrap}
.p-foot{background:#0d3320;color:#4caf50}.p-frac{background:#3d1515;color:#ff5252}.p-tempo{background:#3d2e15;color:#ffab40}.p-long{background:#152035;color:#448aff}.p-cote{background:#1a2a2a;color:var(--cy)}.p-comp{background:#3d1535;color:var(--pr)}.p-musc{background:var(--prd);color:var(--pr)}.p-abdo{background:var(--yld);color:var(--yl)}.p-perso{background:var(--bld);color:var(--bl)}
.p-xp{background:var(--acg);color:var(--ac);margin-left:3px}

/* ═══ MUSCU CARD ═══ */
.muscu-card{background:var(--sf2);border:1px solid var(--bd);border-radius:12px;padding:12px;margin-bottom:6px}
.muscu-exo{margin-bottom:10px}
.muscu-exo:last-child{margin-bottom:0}
.muscu-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.muscu-name{font-weight:700;font-size:.8rem;display:flex;align-items:center;gap:5px}
.muscu-target{font-size:.65rem;color:var(--ac);font-weight:700;background:var(--acg);padding:2px 8px;border-radius:6px}
.muscu-max-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.muscu-max-row label{font-size:.6rem;color:var(--tx2);text-transform:uppercase;font-weight:600;white-space:nowrap}
.muscu-max-row input{width:56px;background:var(--sf3);border:1px solid var(--bd);border-radius:6px;padding:5px 8px;color:var(--tx);font-family:'Outfit';font-size:.8rem;text-align:center}
.muscu-max-row input:focus{outline:none;border-color:var(--ac)}
.muscu-max-row .calc{font-size:.7rem;color:var(--gr);font-weight:700}
.series-row{display:flex;gap:4px}
.serie-btn{
  flex:1;height:34px;border-radius:8px;border:1.5px solid var(--bd);
  background:var(--sf3);color:var(--tx3);font-family:'Outfit';font-size:.7rem;font-weight:700;
  cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:3px;
}
.serie-btn.on{background:var(--gr);border-color:var(--gr);color:#fff;box-shadow:0 0 8px var(--grg)}
.serie-btn .s-num{font-family:'Bebas Neue',sans-serif;font-size:.9rem}
.muscu-progress{height:3px;background:var(--sf3);border-radius:2px;margin-top:6px;overflow:hidden}
.muscu-progress-fill{height:100%;background:var(--pr);border-radius:2px;transition:width .3s}

/* Phase selector */
.phase-sel{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;padding-bottom:4px}
.ps{padding:6px 12px;border-radius:8px;font-size:.65rem;font-weight:700;cursor:pointer;border:1px solid var(--bd);color:var(--tx2);background:var(--sf);white-space:nowrap;transition:all .2s}
.ps.active{background:var(--ac);border-color:var(--ac);color:#fff}
.ps.pre{border-style:dashed}

/* Weight */
.wi-row{display:flex;gap:7px;margin-bottom:10px}
.wi-row input{flex:1;background:var(--sf2);border:1px solid var(--bd);border-radius:9px;padding:10px 12px;color:var(--tx);font-family:'Outfit';font-size:.85rem}
.wi-row input:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 3px var(--acg)}
.btn{background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;border-radius:9px;padding:10px 16px;color:#fff;font-weight:700;font-size:.78rem;cursor:pointer;font-family:'Outfit'}
.btn:active{transform:scale(.95)}
.btn-sm{padding:6px 11px;font-size:.68rem;border-radius:7px}
.btn-ghost{background:var(--sf2);border:1px solid var(--bd);color:var(--tx2)}
.btn-danger{background:var(--rdd);color:var(--rd)}
.wl{max-height:180px;overflow-y:auto}
.we{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bd);font-size:.75rem}
.we .wd2{color:var(--tx2)}.du{color:var(--rd)}.dd{color:var(--gr)}
canvas{width:100%;height:140px;border-radius:9px;margin-top:8px}

/* Profile */
.pg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pi{background:var(--sf2);border-radius:9px;padding:9px 10px}
.pi .pl{font-size:.52rem;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.pi .pv{font-weight:700;font-size:.85rem;margin-top:1px}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.tag{font-size:.58rem;padding:3px 7px;border-radius:9px;font-weight:700}
.tr{background:var(--rdd);color:var(--rd)}.tg{background:var(--grd);color:var(--gr)}.ty{background:var(--yld);color:var(--yl)}
.rule{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd);font-size:.75rem;color:var(--tx2);align-items:center}
.rule:last-child{border-bottom:none}

/* Heatmap */
.hm{display:flex;flex-wrap:wrap;gap:3px;margin-top:8px}
.hmc{width:13px;height:13px;border-radius:3px;background:var(--sf3)}
.hmc.l1{background:#1a3520}.hmc.l2{background:#246830}.hmc.l3{background:#2e9a40}.hmc.l4{background:var(--gr)}
.hmc.tc{outline:2px solid var(--ac);outline-offset:-1px}

/* Settings */
.oi{display:flex;align-items:center;gap:7px;padding:7px 0;border-bottom:1px solid var(--bd)}
.oi input{background:var(--sf2);border:1px solid var(--bd);border-radius:7px;padding:7px 9px;color:var(--tx);font-family:'Outfit';font-size:.78rem}
.oi input:focus{outline:none;border-color:var(--ac)}
.db{width:24px;height:24px;border-radius:50%;border:none;background:var(--rdd);color:var(--rd);font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ar{display:flex;gap:7px;margin-top:8px}
.ar input{background:var(--sf2);border:1px solid var(--bd);border-radius:7px;padding:7px 9px;color:var(--tx);font-family:'Outfit';font-size:.78rem;flex:1}
.ar input:focus{outline:none;border-color:var(--ac)}
.io{display:flex;gap:7px;margin-top:8px}

.record{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--bd)}
.record:last-child{border-bottom:none}
.rec-i{font-size:1.2rem}.rec-l{font-size:.6rem;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px}
.rec-v{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;line-height:1.1}.rec-s{font-size:.58rem;color:var(--tx3)}

.panel{display:none}.panel.active{display:block}
.rest-b{text-align:center;padding:24px 14px;color:var(--tx2)}
.rest-b .ri{font-size:2.4rem;margin-bottom:6px}
.pt{display:inline-block;font-size:.55rem;padding:3px 9px;border-radius:7px;font-weight:800;letter-spacing:1px;text-transform:uppercase;background:var(--sf3);color:var(--tx2)}

/* Bottom nav */
.bn{position:fixed;bottom:0;left:0;right:0;z-index:50;background:linear-gradient(to top,var(--bg) 60%,transparent);padding:6px 0 0}
.bni{max-width:520px;margin:0 auto;display:flex;justify-content:space-around;align-items:center;background:var(--sf);border:1px solid var(--bd);border-radius:18px 18px 0 0;padding:7px 0 11px;backdrop-filter:blur(20px)}
.nb{display:flex;flex-direction:column;align-items:center;gap:1px;background:none;border:none;color:var(--tx3);cursor:pointer;font-size:.5rem;font-weight:600;letter-spacing:.5px;text-transform:uppercase;font-family:'Outfit';padding:3px 10px;transition:color .2s}
.nb .ni{font-size:1.15rem;transition:transform .2s}.nb.active{color:var(--ac)}.nb.active .ni{transform:scale(1.15)}

/* Confetti */
.conf{position:fixed;inset:0;pointer-events:none;z-index:9998;overflow:hidden}
.cp{position:absolute;animation:cfall 1.5s ease-out forwards}
@keyframes cfall{0%{transform:translateY(-20px) rotate(0) scale(1);opacity:1}100%{transform:translateY(100vh) rotate(720deg) scale(0);opacity:0}}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
</style>
</head>

<div class="app">
  <div class="hero">
    <h1>SUB 40</h1>

</div>

</div></div>

<script>

const DPERSO=[

  {id:'p3',icon:'💧',name:"Boire 2L d'eau"},{id:'p4',icon:'📦',name:'AWS'},

// ═══ PHASE 0: RECONSTRUCTION (3 weeks) ═══
const PH0=[

    {type:'tempo',badge:'Tempo',name:'2×8 min à 5:00/km',desc:'10 min échauf — récup 2 min.',xp:50},

    {type:'tempo',badge:'Tempo',name:'2×10 min à 4:50/km',desc:'10 min échauf — récup 2 min.',xp:55},
    {type:'long',badge:'Sortie longue',name:'1h05 footing',desc:'',xp:45},
  ]},
];

// ═══ PHASE 1: PLAN TIME TO 10K SUB40 (8 weeks) ═══
const PH1=[
  {title:'S1 — FRACTIONNÉ COURT',s:[
    {type:'frac',badge:'Fractionné',name:'2×7×200m en 40s',desc:'Récup 45s trot, 3 min entre séries. Retour calme 10 min.',xp:50},

const XPL=200;

// ═══ STATE ═══
let S=JSON.parse(localStorage.getItem('sub40v6')||'{}');
if(!S.done)S.done={};if(!S.weights)S.weights=[];if(!S.perso)S.perso=JSON.parse(JSON.stringify(DPERSO));
if(!S.xp)S.xp=0;if(!S.streak)S.streak=0;if(!S.lastActive)S.lastActive='';
if(!S.heatmap)S.heatmap={};if(!S.weekOv)S.weekOv=null;if(!S.phase)S.phase=0;
if(!S.muscu)S.muscu={dips:{max:0},pompes:{max:0},tractions:{max:0}};
if(!S.series)S.series={};
function save(){localStorage.setItem('sub40v6',JSON.stringify(S));}

const now=new Date();const tds=now.toISOString().slice(0,10);const dow=now.getDay();
let selDay=dow;let curNav='today';

// Streak
if(S.lastActive&&S.lastActive!==tds){const y=new Date(now);y.setDate(y.getDate()-1);if(S.lastActive!==y.toISOString().slice(0,10))S.streak=0;}

function getWI(){
  if(S.weekOv!==null)return S.weekOv;
  const diff=Math.floor((now-W1_START)/(7*86400000));
  return diff<0?-1:Math.min(diff,10);
}
let curW=getWI();

function getPhaseWeeks(){return S.phase===0?PH0:PH1;}
function getWeekData(wi){const ws=getPhaseWeeks();if(wi<0||wi>=ws.length)return null;return ws[wi];}

// ═══ TASKS ═══
function getDayTasks(d,wi){
  const tasks=[];const sc=SC[d];const wd=getWeekData(wi);
  if(wd&&sc.r!==null&&sc.r<wd.s.length){
    const r=wd.s[sc.r];
    tasks.push({id:`ph${S.phase}-w${wi}-r${sc.r}`,cat:'run',type:r.type,badge:r.badge,icon:'🏃',name:r.name,desc:r.desc,xp:r.xp||40});
  }
  if(sc.m)tasks.push({id:`${tds}-muscu-${d}`,cat:'muscu',type:'muscu',badge:'Muscu',icon:'🏋️',name:'Dips, Pompes, Tractions',desc:'4×séries à 80% du max',xp:25});
  if(sc.a)tasks.push({id:`${tds}-abdo-${d}`,cat:'abdos',type:'abdos',badge:'Abdos',icon:'🔥',name:'Vidéo TiboinShape',desc:'',xp:15});
  S.perso.forEach(p=>{tasks.push({id:`${tds}-${p.id}`,cat:'perso',type:'perso',badge:'Perso',icon:p.icon,name:p.name,desc:'',xp:10});});
  return tasks;
}

function toggle(id,xp){
  const was=!!S.done[id];S.done[id]=!was;
  if(!S.done[id]){delete S.done[id];S.xp=Math.max(0,S.xp-(xp||10));}
  else{S.xp+=(xp||10);S.lastActive=tds;}
  const tasks=getDayTasks(selDay,curW);const dc=tasks.filter(t=>S.done[t.id]).length;
  S.heatmap[tds]=dc;
  if(dc>0&&S.lastActive!==tds){S.streak++;S.lastActive=tds;}
  save();render();
  if(!was&&tasks.every(t=>S.done[t.id]))confetti();
}

function toggleSerie(exoId,sIdx){
  const k=`${tds}-${exoId}-s${sIdx}`;
  S.series[k]=!S.series[k];if(!S.series[k])delete S.series[k];
  save();render();
}

function setMax(exoId,val){S.muscu[exoId].max=parseInt(val)||0;save();render();}

// ═══ RENDER ═══
function updateHdr(){
  const diff=Math.max(0,Math.ceil((GOAL-now)/864e5));const w=Math.floor(diff/7);const d=diff%7;

  const qi=now.getDate()%QUOTES.length;const q=QUOTES[qi];
  document.getElementById('qtCard').innerHTML=`${q.t}${q.a?`<div class="qa">— ${q.a}</div>`:''}`;
}

function render(){
  const c=document.getElementById('pc');
  switch(curNav){
    case'today':c.innerHTML=rToday();break;case'program':c.innerHTML=rProgram();break;
    case'stats':c.innerHTML=rStats();break;case'profile':c.innerHTML=rProfile();break;
    case'settings':c.innerHTML=rSettings();break;
  }
  postRender();
}

function rToday(){

  const lv=Math.floor(S.xp/XPL)+1;const xpIn=S.xp%XPL;const pct=Math.round(xpIn/XPL*100);
  let h='';

  h+=`<div class="sg">
    <div class="st"><div class="sl">Aujourd'hui</div><div class="sv">${done}<span>/${total}</span></div></div>
    <div class="st"><div class="sl">Poids</div><div class="sv">${S.weights.length?S.weights[S.weights.length-1].kg:'98'}<span> kg</span></div></div>
    <div class="st"><div class="sl">Phase</div><div class="sv">${S.phase===0?'Recon':'Sub40'}</div><div class="ss">${curW<0?'Pré-saison':getWeekData(curW)?.title.split('—')[0]||''}</div></div>

  </div>`;

  h+=`<div class="xp"><div class="xp-h"><div class="xp-lv">NIVEAU <span class="xp-badge">${lv}</span></div><div class="xp-amt">${xpIn}/${XPL} XP</div></div><div class="xp-bar"><div class="xp-fill" style="width:${pct}%"></div></div></div>`;
  h+=`<div class="dp"><div class="dp-h"><span class="dp-l">Progression du jour</span><span class="dp-c">${done}/${total}</span></div><div class="dp-b"><div class="dp-f" style="width:${total?done/total*100:0}%"></div></div></div>`;
  h+=rWStrip();

  if(curW<0)h+=`<div style="text-align:center;margin-bottom:12px"><span class="pt">🏗️ PRÉ-SAISON</span></div>`;

  // Training tasks (non-muscu)
  const runTasks=train.filter(t=>t.cat==='run');
  const muscuTask=train.find(t=>t.cat==='muscu');
  const abdoTask=train.find(t=>t.cat==='abdos');

  if(train.length){
    h+=`<div class="c"><div class="ct">🏋️ Entraînement — ${dn}</div>`;
    runTasks.forEach(t=>{h+=tHTML(t);});

    // Muscu expandable
    if(muscuTask){
      h+=tHTML(muscuTask);
      h+=rMuscu();
    }
    if(abdoTask)h+=tHTML(abdoTask);
    h+='</div>';
  } else {
    h+=`<div class="c"><div class="rest-b"><div class="ri">😴</div>${dn} — Repos</div></div>`;
  }

  h+=`<div class="c"><div class="ct-row"><div class="ct" style="margin-bottom:0">🎯 Objectifs du jour</div><button class="btn btn-sm btn-ghost" onclick="nav('settings')">✏️</button></div>`;
  perso.forEach(t=>{h+=tHTML(t);});

  return h;
}

function tHTML(t){
  const done=!!S.done[t.id];
  const pt=t.type==='cote'?'p-cote':t.type==='comp'?'p-comp':'p-'+t.type.replace('frac','frac').replace('footing','foot').replace('long','long').replace('tempo','tempo').replace('muscu','musc').replace('abdos','abdo').replace('perso','perso');
  return `<div class="t ${done?'done':''}"><button class="ck ${done?'on':''}" onclick="toggle('${t.id}',${t.xp||10})"></button><div class="tt"><div class="tn">${t.icon} ${t.name}</div>${t.desc?`<div class="td2">${t.desc}</div>`:''}</div><span class="pill ${pt}">${t.badge}</span><span class="pill p-xp">+${t.xp||10}</span></div>`;

function rMuscu(){
  let h='<div class="muscu-card">';
  EXOS.forEach(ex=>{
    const max=S.muscu[ex.id]?.max||0;
    const target=max?Math.round(max*0.8):0;
    let seriesDone=0;
    for(let i=0;i<4;i++){if(S.series[`${tds}-${ex.id}-s${i}`])seriesDone++;}
    h+=`<div class="muscu-exo">
      <div class="muscu-head">
        <div class="muscu-name">${ex.icon} ${ex.name}</div>
        ${target?`<div class="muscu-target">${target} reps (80%)</div>`:'<div class="muscu-target">Définir max ↓</div>'}
      </div>
      <div class="muscu-max-row">
        <label>Max :</label>
        <input type="number" value="${max||''}" placeholder="—" onchange="setMax('${ex.id}',this.value)">
        ${max?`<span class="calc">→ 80% = ${target}</span>`:''}
      </div>
      <div class="series-row">`;
    for(let i=0;i<4;i++){
      const on=!!S.series[`${tds}-${ex.id}-s${i}`];
      h+=`<button class="serie-btn ${on?'on':''}" onclick="toggleSerie('${ex.id}',${i})"><span class="s-num">${i+1}</span>/4</button>`;
    }
    h+=`</div><div class="muscu-progress"><div class="muscu-progress-fill" style="width:${seriesDone/4*100}%"></div></div></div>`;
  });
  h+='</div>';
  return h;

function rWStrip(){
  const dates=[];const mon=new Date(now);mon.setDate(mon.getDate()-((dow+6)%7));
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(d.getDate()+i);dates.push(d);}
  let h='<div class="ws">';
  dates.forEach(d=>{
    const rd=d.getDay();const isT=d.toISOString().slice(0,10)===tds;const isA=rd===selDay;
    h+=`<button class="wd ${isT?'today':''} ${isA?'active':''}" onclick="selD(${rd})"><span>${JR[rd]}</span><span class="wn">${d.getDate()}</span></button>`;
  });
  return h+'</div>';
}

  h+=`<div class="c"><div class="ct">📅 Phase & Semaine</div>
    <div style="display:flex;gap:5px;margin-bottom:8px">
      <button class="ps ${S.phase===0?'active':''}" onclick="setPhase(0)" style="flex:1;text-align:center">Reconstruction</button>
      <button class="ps ${S.phase===1?'active':''}" onclick="setPhase(1)" style="flex:1;text-align:center">Plan Sub 40</button>
    </div>
    <div class="phase-sel">`;
  const ws=getPhaseWeeks();
  if(S.phase===0)h+=`<div class="ps pre ${curW<0?'active':''}" onclick="sw(-1)">Pré</div>`;
  ws.forEach((_,i)=>{h+=`<div class="ps ${curW===i?'active':''}" onclick="sw(${i})">S${i+1}</div>`;});
  h+=`</div></div>`;

  h+=`<div class="c"><div class="ct">💾 Données</div>
    <div class="io"><button class="btn btn-sm" onclick="exp()">📤 Exporter</button><button class="btn btn-sm btn-ghost" onclick="document.getElementById('iF').click()">📥 Importer</button><input type="file" id="iF" accept=".json" style="display:none" onchange="imp(event)"></div>
    <div class="io"><button class="btn btn-sm btn-danger" onclick="rst()">🗑️ Tout supprimer</button></div>
  </div>`;
  return h;
}

function esc(s){return s.replace(/"/g,'&quot;').replace(/</g,'&lt;');}

// ═══ NAV ═══
function nav(n){curNav=n;document.querySelectorAll('.nb').forEach(b=>{b.classList.toggle('active',b.dataset.n===n);});render();window.scrollTo({top:0,behavior:'smooth'});}
document.querySelectorAll('.nb').forEach(b=>{b.addEventListener('click',()=>nav(b.dataset.n));});
function selD(d){selDay=d;render();}
function sw(w){curW=w;S.weekOv=w;save();render();}
function setPhase(p){S.phase=p;curW=0;S.weekOv=0;save();render();}

// ═══ OBJ ═══
function uObj(i,f,v){S.perso[i][f]=v;save();render();}
function rObj(i){S.perso.splice(i,1);save();render();}
function aObj(){const ic=document.getElementById('nI')?.value.trim()||'🆕';const nm=document.getElementById('nN')?.value.trim();if(!nm)return;S.perso.push({id:'p'+Date.now(),icon:ic,name:nm});save();render();}

// ═══ WEIGHT ═══
function addW(){const el=document.getElementById('wIn');if(!el)return;const v=parseFloat(el.value);if(!v||v<50||v>200)return;S.weights.push({date:new Date().toLocaleDateString('fr-FR'),kg:v,iso:tds});save();el.value='';render();}
function rWeights(){
  const el=document.getElementById('wLog');if(!el)return;
  if(!S.weights.length){el.innerHTML='<div style="color:var(--tx2);font-size:.7rem;padding:6px 0">Aucune entrée</div>';return;}
  let h='';[...S.weights].reverse().forEach((w,i,a)=>{
    let d='';if(i<a.length-1){const x=(w.kg-a[i+1].kg).toFixed(1);if(x>0)d=`<span class="du">+${x}</span>`;else if(x<0)d=`<span class="dd">${x}</span>`;}
    h+=`<div class="we"><span class="wd2">${w.date}</span><span style="font-weight:700">${w.kg} kg ${d}</span></div>`;
  });el.innerHTML=h;
}
function dChart(){
  const cv=document.getElementById('wCh');if(!cv||S.weights.length<2)return;
  const ctx=cv.getContext('2d');const dpr=window.devicePixelRatio||1;const r=cv.getBoundingClientRect();
  cv.width=r.width*dpr;cv.height=140*dpr;ctx.scale(dpr,dpr);
  const W=r.width,H=140,p=30;ctx.clearRect(0,0,W,H);
  const vs=S.weights.map(w=>w.kg);const mn=Math.min(...vs,90)-1;const mx=Math.max(...vs)+1;
  ctx.fillStyle='#00e67610';const y1=p+((mx-92)/(mx-mn))*(H-2*p);const y2=p+((mx-90)/(mx-mn))*(H-2*p);
  ctx.fillRect(p,y1,W-2*p,y2-y1);
  ctx.strokeStyle='#00e67633';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(p,y1);ctx.lineTo(W-p,y1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(p,y2);ctx.lineTo(W-p,y2);ctx.stroke();ctx.setLineDash([]);
  const gd=ctx.createLinearGradient(0,0,0,H);gd.addColorStop(0,'#ff4d0030');gd.addColorStop(1,'#ff4d0000');
  ctx.beginPath();vs.forEach((v,i)=>{const x=p+(i/(vs.length-1))*(W-2*p);const y=p+((mx-v)/(mx-mn))*(H-2*p);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.lineTo(p+(vs.length-1)/(vs.length-1)*(W-2*p),H-p);ctx.lineTo(p,H-p);ctx.closePath();ctx.fillStyle=gd;ctx.fill();
  ctx.beginPath();ctx.strokeStyle='#ff4d00';ctx.lineWidth=2.5;
  vs.forEach((v,i)=>{const x=p+(i/(vs.length-1))*(W-2*p);const y=p+((mx-v)/(mx-mn))*(H-2*p);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.stroke();
  vs.forEach((v,i)=>{const x=p+(i/(vs.length-1))*(W-2*p);const y=p+((mx-v)/(mx-mn))*(H-2*p);ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle='#ff4d00';ctx.fill();ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();});
}
function rHeatmap(){
  const el=document.getElementById('hmG');if(!el)return;let h='';
  for(let i=29;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);const ds=d.toISOString().slice(0,10);const c=S.heatmap[ds]||0;const isT=ds===tds;
  let l='';if(c>=12)l='l4';else if(c>=8)l='l3';else if(c>=4)l='l2';else if(c>=1)l='l1';
  h+=`<div class="hmc ${l} ${isT?'tc':''}" title="${ds}: ${c}"></div>`;}el.innerHTML=h;
}

// ═══ EXPORT/IMPORT ═══
function exp(){const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`sub40-${tds}.json`;a.click();}
function imp(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.done!==undefined){S=d;save();location.reload();}else alert('Invalide');}catch(err){alert(err.message);}};r.readAsText(f);e.target.value='';}
function rst(){if(!confirm('Tout supprimer ?'))return;localStorage.removeItem('sub40v6');location.reload();}

// ═══ CONFETTI ═══
function confetti(){const c=document.getElementById('confC');const cols=['#ff4d00','#00e676','#ffea00','#40c4ff','#e040fb','#18ffff'];
for(let i=0;i<50;i++){const p=document.createElement('div');p.className='cp';p.style.left=Math.random()*100+'%';p.style.top='-10px';p.style.background=cols[Math.floor(Math.random()*cols.length)];p.style.animationDelay=Math.random()*.5+'s';p.style.animationDuration=(1+Math.random())+'s';p.style.borderRadius=Math.random()>.5?'50%':'2px';p.style.width=(4+Math.random()*6)+'px';p.style.height=(4+Math.random()*6)+'px';c.appendChild(p);setTimeout(()=>p.remove(),2500);}}

function postRender(){
  if(curNav==='stats'){rWeights();setTimeout(dChart,50);rHeatmap();}
  const wi=document.getElementById('wIn');if(wi)wi.onkeydown=e=>{if(e.key==='Enter')addW();};
}

// ═══ INIT ═══
document.getElementById('todayLabel').textContent=now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
updateHdr();render();
</script>
